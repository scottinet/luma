description: XFCE4 Terminal Light Theme
target: themes/terminals/xfce4-terminal/luma-light.theme
variant: light
content: |
  [Scheme]
  Name=Luma Light
  ColorForeground={{color:black}}
  ColorBackground={{color:white}}
  ColorCursor={{color:black;luminosity:brighter}}
  ColorPalette={{color:white}};{{color:red}};{{color:green}};{{color:yellow}};{{color:blue}};{{color:magenta}};{{color:cyan}};{{color:black;luminosity:brighter}};{{color:black;luminosity:brighter}};{{color:red;luminosity:brighter}};{{color:green;luminosity:brighter}};{{color:yellow;luminosity:brighter}};{{color:blue;luminosity:brighter}};{{color:magenta;luminosity:brighter}};{{color:cyan;luminosity:brighter}};{{color:white;luminosity:brighter}}
  ColorCursorUseDefault=FALSE
