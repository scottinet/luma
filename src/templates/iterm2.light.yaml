description: iTerm2 Light Theme
target: themes/terminals/iterm2/Luma-light.itermcolors
variant: light
content: |
  <?xml version="1.0" encoding="UTF-8"?>
  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
  <plist version="1.0">
    <dict>
      <key>Background Color</key>
      {{color:white;format:pdict}}
      <key>Foreground Color</key>
      {{color:black;format:pdict}}
      <key>Cursor Color</key>
      {{color:black;luminosity:brighter;format:pdict}}
      <key>Cursor Text Color</key>
      {{color:white;luminosity:darker;format:pdict}}
      <key>Selection Color</key>
      {{color:cyan;format:pdict}}
      <key>Selected Text Color</key>
      {{color:black;luminosity:brighter;format:pdict}}
      <key>Ansi 0 Color</key>
      {{color:white;format:pdict}}
      <key>Ansi 1 Color</key>
      {{color:red;format:pdict}}
      <key>Ansi 2 Color</key>
      {{color:green;format:pdict}}
      <key>Ansi 3 Color</key>
      {{color:yellow;format:pdict}}
      <key>Ansi 4 Color</key>
      {{color:blue;format:pdict}}
      <key>Ansi 5 Color</key>
      {{color:magenta;format:pdict}}
      <key>Ansi 6 Color</key>
      {{color:cyan;format:pdict}}
      <key>Ansi 7 Color</key>
      {{color:black;luminosity:brighter;format:pdict}}
      <key>Ansi 8 Color</key>
      {{color:black;luminosity:brighter;format:pdict}}
      <key>Ansi 9 Color</key>
      {{color:red;luminosity:brighter;format:pdict}}
      <key>Ansi 10 Color</key>
      {{color:green;luminosity:brighter;format:pdict}}
      <key>Ansi 11 Color</key>
      {{color:yellow;luminosity:brighter;format:pdict}}
      <key>Ansi 12 Color</key>
      {{color:blue;luminosity:brighter;format:pdict}}
      <key>Ansi 13 Color</key>
      {{color:magenta;luminosity:brighter;format:pdict}}
      <key>Ansi 14 Color</key>
      {{color:cyan;luminosity:brighter;format:pdict}}
      <key>Ansi 15 Color</key>
      {{color:white;luminosity:brighter;format:pdict}}
      <key>Ansi 184 Color</key>
      {{color:yellow;luminosity:darker;format:pdict}}
      <key>Ansi 185 Color</key>
      {{color:yellow;format:pdict}}
      <key>Ansi 220 Color</key>
      {{color:yellow;format:pdict}}
      <key>Bold Color</key>
      {{color:black;luminosity:brighter;format:pdict}}
      <key>Link Color</key>
      {{color:blue;format:pdict}}
    </dict>
  </plist>
