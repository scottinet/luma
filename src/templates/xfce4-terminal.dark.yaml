description: XFCE4 Terminal Dark Theme
target: themes/terminals/xfce4-terminal/luma-dark.theme
variant: dark
content: |
  [Scheme]
  Name=Luma Dark
  ColorForeground={{color:white}}
  ColorBackground={{color:black}}
  ColorCursor={{color:white;luminosity:darker}}
  ColorPalette={{color:black}};{{color:red}};{{color:green}};{{color:yellow}};{{color:blue}};{{color:magenta}};{{color:cyan}};{{color:white}};{{color:white;luminosity:darker}};{{color:red;luminosity:brighter}};{{color:green;luminosity:brighter}};{{color:yellow;luminosity:brighter}};{{color:blue;luminosity:brighter}};{{color:magenta;luminosity:brighter}};{{color:cyan;luminosity:brighter}};{{color:white;luminosity:brighter}}
  ColorCursorUseDefault=FALSE
