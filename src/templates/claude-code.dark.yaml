description: Claude Code Dark Theme
target: themes/editors/claude-code/luma-dark.json
variant: dark
content: |
  {
    "name": "Luma Dark",
    "base": "dark",
    "overrides": {
      "claude": "{{color:cyan}}",
      "text": "{{color:orange}}",
      "inverseText": "{{color:black;luminosity:darker}}",
      "inactive": "{{color:gray}}",
      "subtle": "{{color:gray;luminosity:darker}}",
      "suggestion": "{{color:cyan}}",
      "success": "{{color:green}}",
      "error": "{{color:red}}",
      "warning": "{{color:yellow}}",
      "merged": "{{color:magenta}}",
      "permission": "{{color:orange}}",
      "remember": "{{color:magenta}}",
      "promptBorder": "{{color:cyan}}",
      "planMode": "{{color:blue}}",
      "autoAccept": "{{color:green}}",
      "bashBorder": "{{color:pink}}",
      "fastMode": "{{color:orange}}",
      "ide": "{{color:blue}}",
      "userMessageBackground": "{{color:black;luminosity:brighter}}",
      "diffAdded": "{{color:green;alpha:18;over:black-darker}}",
      "diffRemoved": "{{color:red;alpha:18;over:black-darker}}",
      "diffAddedDimmed": "{{color:green;alpha:9;over:black-darker}}",
      "diffRemovedDimmed": "{{color:red;alpha:9;over:black-darker}}",
      "diffAddedWord": "{{color:green;alpha:35;over:black-darker}}",
      "diffRemovedWord": "{{color:red;alpha:35;over:black-darker}}"
    }
  }
